name: Build and Release to GitHub Pages

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Application
        # This will create release/*.exe and release/latest.yml
        run: npm run build:win

      - name: Deploy to GitHub Pages (Free File Server)
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.GH_TOKEN }}
          publish_dir: ./release
          # This replaces the gh-pages branch with only the latest release files
          # keeping your repository clean and below size limits.
