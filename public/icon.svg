<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F1923;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A2A38;stop-opacity:1" />
    </linearGradient>

    <!-- Accent gradient for checkmark -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2FFFA8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00D4FF;stop-opacity:1" />
    </linearGradient>

    <!-- Lynx shape gradient -->
    <linearGradient id="lynxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2FFFA8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00C4EE;stop-opacity:1" />
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow for background elements -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Rounded corner mask -->
    <clipPath id="roundedClip">
      <rect width="512" height="512" rx="100" ry="100"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="100" ry="100" fill="url(#bgGrad)"/>

  <!-- Subtle grid texture -->
  <g opacity="0.04" clip-path="url(#roundedClip)">
    <line x1="0" y1="128" x2="512" y2="128" stroke="#2FFFA8" stroke-width="1"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="#2FFFA8" stroke-width="1"/>
    <line x1="0" y1="384" x2="512" y2="384" stroke="#2FFFA8" stroke-width="1"/>
    <line x1="128" y1="0" x2="128" y2="512" stroke="#2FFFA8" stroke-width="1"/>
    <line x1="256" y1="0" x2="256" y2="512" stroke="#2FFFA8" stroke-width="1"/>
    <line x1="384" y1="0" x2="384" y2="512" stroke="#2FFFA8" stroke-width="1"/>
  </g>

  <!-- Background glow blobs -->
  <circle cx="150" cy="140" r="90" fill="#2FFFA8" opacity="0.04" filter="url(#softGlow)"/>
  <circle cx="370" cy="370" r="80" fill="#00D4FF" opacity="0.05" filter="url(#softGlow)"/>

  <!-- === MAIN ICON: Clipboard with stylized checkmark and ears === -->

  <!-- Clipboard body -->
  <rect x="148" y="140" width="220" height="260" rx="18" ry="18" fill="none" stroke="#2FFFA8" stroke-width="5" opacity="0.18"/>
  <rect x="154" y="146" width="208" height="248" rx="14" ry="14" fill="#162330"/>

  <!-- Clipboard top clamp -->
  <rect x="214" y="132" width="88" height="28" rx="8" ry="8" fill="#0F1923" stroke="#2FFFA8" stroke-width="3.5" opacity="0.9"/>
  <rect x="232" y="138" width="52" height="14" rx="4" ry="4" fill="#1A2F40"/>

  <!-- === LYNX EARS at top of clipboard === -->
  <!-- Left ear -->
  <polygon points="168,152 148,108 196,140" fill="url(#lynxGrad)" opacity="0.85" filter="url(#glow)"/>
  <polygon points="172,149 156,116 190,142" fill="#0F1923" opacity="0.5"/>
  <!-- Right ear -->
  <polygon points="348,152 368,108 320,140" fill="url(#lynxGrad)" opacity="0.85" filter="url(#glow)"/>
  <polygon points="344,149 360,116 326,142" fill="#0F1923" opacity="0.5"/>

  <!-- Task lines -->
  <!-- Line 1 - checked -->
  <rect x="196" y="198" width="124" height="7" rx="3.5" fill="#2FFFA8" opacity="0.25"/>
  <!-- Line 2 -->
  <rect x="196" y="236" width="100" height="7" rx="3.5" fill="#ffffff" opacity="0.12"/>
  <!-- Line 3 -->
  <rect x="196" y="274" width="112" height="7" rx="3.5" fill="#ffffff" opacity="0.10"/>
  <!-- Line 4 -->
  <rect x="196" y="312" width="90" height="7" rx="3.5" fill="#ffffff" opacity="0.08"/>

  <!-- Check circle for line 1 -->
  <circle cx="176" cy="201" r="11" fill="none" stroke="#2FFFA8" stroke-width="2.5" opacity="0.5"/>
  <polyline points="169,201 174,207 184,194" fill="none" stroke="url(#accentGrad)" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Unchecked circles for other lines -->
  <circle cx="176" cy="239" r="11" fill="none" stroke="#ffffff" stroke-width="2.2" opacity="0.18"/>
  <circle cx="176" cy="277" r="11" fill="none" stroke="#ffffff" stroke-width="2.2" opacity="0.14"/>
  <circle cx="176" cy="315" r="11" fill="none" stroke="#ffffff" stroke-width="2.2" opacity="0.10"/>

  <!-- === BIG STYLIZED CHECK overlaid bottom-right, like a logo accent === -->
  <g filter="url(#glow)" opacity="0.92">
    <polyline points="296,318 318,345 364,284" fill="none" stroke="url(#accentGrad)" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Bottom label area -->
  <!-- Subtle horizontal rule -->
  <line x1="174" y1="358" x2="342" y2="358" stroke="#2FFFA8" stroke-width="1" opacity="0.1"/>

  <!-- TaskLyn wordmark below icon -->
  <text
    x="258"
    y="440"
    font-family="'Courier New', 'Lucida Console', monospace"
    font-size="42"
    font-weight="700"
    letter-spacing="3"
    text-anchor="middle"
    fill="url(#accentGrad)"
    filter="url(#glow)"
  >TaskLyn</text>

  <!-- Thin underline accent -->
  <line x1="178" y1="450" x2="338" y2="450" stroke="url(#accentGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>

  <!-- Corner accent dots -->
  <circle cx="136" cy="136" r="4" fill="#2FFFA8" opacity="0.25"/>
  <circle cx="378" cy="136" r="4" fill="#2FFFA8" opacity="0.25"/>
  <circle cx="136" cy="378" r="4" fill="#2FFFA8" opacity="0.15"/>
  <circle cx="378" cy="378" r="4" fill="#2FFFA8" opacity="0.15"/>
</svg>
